name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-light:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install light dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv PyPDF2 python-pptx faker

      - name: Generate sample documents (PR 1 fixture)
        run: python tests/generate_samples.py

      - name: Validate sample generator (PR 1)
        run: python tests/test_samples.py

      - name: Validate document extractor (PR 2)
        run: python tests/test_extractor.py

      - name: Validate chunker (PR 3)
        run: python tests/test_chunker.py

      - name: Validate manifest / idempotency (PR 3, Mutation 1)
        run: python tests/test_manifest.py

      - name: Validate prompt fossilization (PR 4, Mutation 3)
        run: python tests/test_prompt_cache.py

      - name: Validate time-travel query (PR 4, Mutation 4)
        run: python tests/test_time_travel.py

      - name: Confirm env.example documents all required vars
        run: |
          for var in GEMINI_API_KEY MANIFEST_BACKEND AWS_REGION RAW_DIR; do
            grep -q "^${var}=" .env.example || (echo "MISSING in .env.example: ${var}" && exit 1)
          done
          echo "All required env vars documented."

  validate-heavy:
    runs-on: ubuntu-latest
    needs: validate-light
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-v1

      - name: Install full dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate samples and run pipeline
        run: |
          python tests/generate_samples.py
          python -m src.extractor
          python -m src.chunker

      - name: Validate embedder + FAISS index + idempotency (PR 3)
        run: python tests/test_embedder.py

      - name: Validate fine-tuning dataset builder (PR 4, Mutation 5)
        run: python tests/test_finetune_builder.py

      - name: Validate FastAPI endpoints (PR 4 — all 4 endpoints)
        run: python tests/test_api.py
