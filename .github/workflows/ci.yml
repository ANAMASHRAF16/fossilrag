name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies needed for tests
        run: |
          python -m pip install --upgrade pip
          # Only install what tests need so CI stays fast.
          # Heavier deps (sentence-transformers, faiss) join in later PRs.
          pip install python-dotenv PyPDF2 python-pptx faker

      - name: Generate sample documents (PR 1 fixture)
        run: python tests/generate_samples.py

      - name: Validate sample generator (PR 1)
        run: python tests/test_samples.py

      - name: Validate document extractor + marker module (PR 2)
        run: python tests/test_extractor.py

      - name: Confirm env.example documents all required vars
        run: |
          for var in GEMINI_API_KEY MANIFEST_BACKEND AWS_REGION RAW_DIR; do
            grep -q "^${var}=" .env.example || (echo "MISSING in .env.example: ${var}" && exit 1)
          done
          echo "All required env vars documented."
